<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swap&Go</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <header class="header">
        <div class="container header-content">
            <div class="logo">Swap<span>&</span>Go</div>
            <div style="display: flex; gap: 16px; align-items: center;">
                <button id="theme-toggle" class="theme-btn">🌙</button>
                <button class="btn-primary" id="add-btn">Добавить вещь</button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="filters">
            <input type="text" placeholder="Найти идеальную вещь для обмена..." class="search-input">
            <div class="categories">
                <button class="category-tag active">Все</button>
                <button class="category-tag">Учебники</button>
                <button class="category-tag">Электроника</button>
                <button class="category-tag">Хобби</button>
                <button class="category-tag">Канцелярия</button>
            </div>
        </section>

        <section class="items-grid"></section>
    </main>

    <div class="modal-overlay" id="add-modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <h2>Новое объявление</h2>
            
            <form id="add-form">
                <input type="text" id="item-title" placeholder="Название (например: Скейтборд)" required>
                <input type="text" id="item-exchange" placeholder="Что хочешь взамен?" required>
                
                <select id="item-category" required>
                    <option value="" disabled selected>Выберите категорию</option>
                    <option value="Учебники">Учебники</option>
                    <option value="Электроника">Электроника</option>
                    <option value="Хобби">Хобби</option>
                    <option value="Канцелярия">Канцелярия</option>
                    <option value="Другое">Другое</option>
                </select>

                <textarea id="item-desc" placeholder="Описание и состояние" required></textarea>
                <input type="text" id="item-contact" placeholder="Ваш Telegram (например: @durov)" required>
                <input type="url" id="item-image" placeholder="Ссылка на фото (необязательно)">
                <button type="submit" class="btn-primary">Опубликовать</button>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="contact-modal">
        <div class="modal-content">
            <span class="close-btn" id="close-contact-modal">&times;</span>
            <div id="contact-modal-body">
                </div>
            <button class="btn-primary" id="copy-contact-btn" style="width: 100%; margin-top: 20px;">Скопировать контакт</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
